<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Translate" />
  <title>Translate</title>
  <style>
    :root {
      --bg:        #0e0e11;
      --surface:   #1a1a20;
      --border:    #2c2c36;
      --muted:     #44445a;
      --subtle:    #6e6e8a;
      --bright:    #f0f0fa;
      --ru-accent: #7b61ff;
      --fr-accent: #ff6b6b;
      --go:        #3dd68c;
      --go-glow:   rgba(61,214,140,.25);
      --radius:    14px;
      --radius-sm: 8px;
      --font-ui:   -apple-system, "SF Pro Rounded", "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "Fira Code", monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--bright);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 24px);
    }
    header {
      padding: 20px 4px 18px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    header .tagline { font-size: 12px; color: var(--subtle); }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .input-wrap { flex: 1; position: relative; }
    .word-input {
      width: 100%;
      height: 56px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--bright);
      font-family: var(--font-ui);
      font-size: 18px;
      font-weight: 500;
      padding: 0 44px 0 16px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .word-input::placeholder { color: var(--muted); }
    .word-input:focus {
      border-color: var(--go);
      box-shadow: 0 0 0 3px var(--go-glow);
    }
    .clear-btn {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); font-size: 18px;
      cursor: pointer; padding: 4px;
      display: none;
    }
    .word-input:not(:placeholder-shown) + .clear-btn { display: block; }
    .go-btn {
      width: 56px; height: 56px;
      flex-shrink: 0;
      background: var(--go);
      border: none; border-radius: var(--radius);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s, opacity .15s;
    }
    .go-btn:active { transform: scale(.93); opacity: .85; }
    .go-btn.loading { opacity: .5; pointer-events: none; }
    .go-btn svg { width: 22px; height: 22px; }

    .rows { display: flex; flex-direction: column; gap: 12px; flex: 1; }

    .lang-row {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px 16px 17px;
      display: flex; align-items: center; gap: 14px;
    }
    .lang-row--ru { border-left: 3px solid var(--ru-accent); }
    .lang-row--fr { border-left: 3px solid var(--fr-accent); }

    .lang-id {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      flex-shrink: 0; width: 36px;
    }
    .lang-flag { font-size: 22px; line-height: 1; }
    .lang-label { font-size: 9px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }
    .lang-row--ru .lang-label { color: var(--ru-accent); }
    .lang-row--fr .lang-label { color: var(--fr-accent); }

    .lang-body { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }

    .translation {
      font-size: 30px; font-weight: 700;
      letter-spacing: -0.5px; line-height: 1.2;
      word-break: break-word;
    }
    .translation.empty { font-size: 15px; font-weight: 400; color: var(--muted); font-style: italic; }

    .phonetic {
      font-family: var(--font-mono);
      font-size: 14px; color: var(--subtle);
      word-break: break-word;
    }
    .phonetic.hidden { display: none; }

    .speak-btn {
      flex-shrink: 0; background: none; border: none;
      padding: 10px; cursor: pointer; color: var(--muted);
      border-radius: var(--radius-sm);
      transition: color .2s, background .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .lang-row--ru .speak-btn:active { color: var(--ru-accent); background: rgba(123,97,255,.1); }
    .lang-row--fr .speak-btn:active { color: var(--fr-accent); background: rgba(255,107,107,.1); }
    .speak-btn:disabled { opacity: .25; cursor: default; }
    .speak-btn svg { width: 24px; height: 24px; }

    .status {
      text-align: center; font-size: 12px;
      color: var(--subtle); padding: 14px 0 4px;
      min-height: 34px;
    }
    .status.error { color: #ff6b6b; }
    .status.loading { color: var(--go); }

    .translation.copyable { cursor: pointer; }
    .translation.copyable:active { opacity: .6; }

    .copy-toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--bright);
      color: var(--bg);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s, transform .15s;
      white-space: nowrap;
    }
    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .shimmer {
      background: linear-gradient(90deg, var(--border) 25%, var(--muted) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      color: transparent !important;
      min-width: 80px; display: inline-block;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Translate</h1>
    <span class="tagline">RU · FR</span>
  </header>

  <div class="input-row">
    <div class="input-wrap">
      <input class="word-input" id="wordInput" type="text"
        placeholder="Enter a word…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button class="clear-btn" id="clearBtn">✕</button>
    </div>
    <button class="go-btn" id="goBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0e0e11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>
  </div>

  <div class="rows">
    <div class="lang-row lang-row--ru">
      <div class="lang-id">
        <span class="lang-flag">🇷🇺</span>
        <span class="lang-label">RU</span>
      </div>
      <div class="lang-body">
        <div class="translation empty" id="ruWord">—</div>
        <div class="phonetic hidden" id="ruPhon"></div>
      </div>
      <button class="speak-btn" id="ruSpeak" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </div>

    <div class="lang-row lang-row--fr">
      <div class="lang-id">
        <span class="lang-flag">🇫🇷</span>
        <span class="lang-label">FR</span>
      </div>
      <div class="lang-body">
        <div class="translation empty" id="frWord">—</div>
        <div class="phonetic hidden" id="frPhon"></div>
      </div>
      <button class="speak-btn" id="frSpeak" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="status" id="status">Enter a word and tap →</div>
  <div class="copy-toast" id="copyToast"></div>
</div>

<script>
  const wordInput = document.getElementById('wordInput');
  const clearBtn  = document.getElementById('clearBtn');
  const goBtn     = document.getElementById('goBtn');
  const status    = document.getElementById('status');
  const ruWord    = document.getElementById('ruWord');
  const frWord    = document.getElementById('frWord');
  const ruPhon    = document.getElementById('ruPhon');
  const frPhon    = document.getElementById('frPhon');
  const ruSpeak   = document.getElementById('ruSpeak');
  const frSpeak   = document.getElementById('frSpeak');

  // ── Russian transliteration table ───────────────────────
  const RU_MAP = {
    'а':'a','б':'b','в':'v','г':'g','д':'d','е':'ye','ё':'yo',
    'ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m',
    'н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u',
    'ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'sch',
    'ъ':'','ы':'y','ь':"'",'э':'e','ю':'yu','я':'ya',
    'А':'A','Б':'B','В':'V','Г':'G','Д':'D','Е':'Ye','Ё':'Yo',
    'Ж':'Zh','З':'Z','И':'I','Й':'Y','К':'K','Л':'L','М':'M',
    'Н':'N','О':'O','П':'P','Р':'R','С':'S','Т':'T','У':'U',
    'Ф':'F','Х':'Kh','Ц':'Ts','Ч':'Ch','Ш':'Sh','Щ':'Sch',
    'Ъ':'','Ы':'Y','Ь':"'",'Э':'E','Ю':'Yu','Я':'Ya'
  };
  function romanize(t) {
    return t.split('').map(c => RU_MAP[c] !== undefined ? RU_MAP[c] : c).join('');
  }

  // ── Translate via Google (no key needed) ─────────────────
  async function translate(text, targetLang) {
    const url = 'https://translate.googleapis.com/translate_a/single'
      + '?client=gtx&sl=en&tl=' + targetLang
      + '&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const d = await res.json();
    const translation = d[0].map(s => s[0]).join('');
    return { translation };
  }

  // ── Claude: English pronunciation guide for French words ──
  async function fetchFrenchPronunciation(frenchWord, englishSource) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 60,
        messages: [{
          role: 'user',
          content: 'Give ONLY a plain English pronunciation guide for the French word "'
            + frenchWord + '" (the French translation of "' + englishSource + '"). '
            + 'Format like: bon-ZHOOR. No explanation, no punctuation, just the pronunciation.'
        }]
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.content?.[0]?.text?.trim() || null;
  }

  // ── UI helpers ───────────────────────────────────────────
  function setLoading() {
    goBtn.classList.add('loading');
    status.textContent = 'Translating…';
    status.className = 'status loading';
    for (const el of [ruWord, frWord]) {
      el.textContent = '\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0';
      el.classList.add('shimmer');
      el.classList.remove('empty');
    }
    ruPhon.classList.add('hidden');
    frPhon.classList.add('hidden');
    ruSpeak.disabled = true;
    frSpeak.disabled = true;
  }

  function setResult(wordEl, phonEl, speakBtn, translation, romanization) {
    wordEl.textContent = translation;
    wordEl.classList.remove('shimmer', 'empty');
    if (romanization) {
      phonEl.textContent = romanization;
      phonEl.classList.remove('hidden');
    }
    speakBtn.disabled = false;
  }

  function reset() {
    wordInput.value = '';
    for (const [el, phon, btn] of [[ruWord, ruPhon, ruSpeak], [frWord, frPhon, frSpeak]]) {
      el.textContent = '—'; el.className = 'translation empty';
      phon.textContent = ''; phon.classList.add('hidden');
      btn.disabled = true;
    }
    status.textContent = 'Enter a word and tap →';
    status.className = 'status';
    goBtn.classList.remove('loading');
  }

  // ── Main ─────────────────────────────────────────────────
  async function run() {
    const word = wordInput.value.trim();
    if (!word) { status.textContent = 'Type a word first.'; status.className = 'status error'; return; }
    setLoading();
    try {
      const [ru, fr] = await Promise.all([translate(word, 'ru'), translate(word, 'fr')]);
      setResult(ruWord, ruPhon, ruSpeak, ru.translation, romanize(ru.translation));
      setResult(frWord, frPhon, frSpeak, fr.translation, '…');
      // Fetch French pronunciation async so it doesn't block the translation display
      fetchFrenchPronunciation(fr.translation, word).then(phon => {
        if (phon) { frPhon.textContent = phon; frPhon.classList.remove('hidden'); }
      });
      status.textContent = '"' + word + '" translated';
      status.className = 'status';
    } catch (e) {
      status.textContent = 'Translation failed — check connection.';
      status.className = 'status error';
      ruWord.textContent = '—'; ruWord.className = 'translation empty';
      frWord.textContent = '—'; frWord.className = 'translation empty';
    } finally {
      goBtn.classList.remove('loading');
    }
  }

  // ── Copy on tap ──────────────────────────────────────────
  const copyToast = document.getElementById('copyToast');
  let toastTimer;

  function showToast(msg) {
    copyToast.textContent = msg;
    copyToast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => copyToast.classList.remove('show'), 1400);
  }

  function makeCopyable(el) {
    el.classList.add('copyable');
    el.addEventListener('click', () => {
      const text = el.textContent.trim();
      if (!text || text === '—') return;
      navigator.clipboard.writeText(text).then(() => {
        showToast('"' + text + '" copied');
      }).catch(() => {
        // Fallback for older Safari
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('"' + text + '" copied');
      });
    });
  }

  makeCopyable(ruWord);
  makeCopyable(frWord);

  // ── Audio (Phase 3) ──────────────────────────────────────
  function speak(text, lang) {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  }

  // ── Events ───────────────────────────────────────────────
  goBtn.addEventListener('click', run);
  wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
  clearBtn.addEventListener('click', reset);
  ruSpeak.addEventListener('click', () => speak(ruWord.textContent, 'ru-RU'));
  frSpeak.addEventListener('click', () => speak(frWord.textContent, 'fr-FR'));
</script>
</body>
</html>
